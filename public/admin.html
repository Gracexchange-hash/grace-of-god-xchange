<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Grace Of God Xchange</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-900:#0A1628; --navy-800:#0F1F3A; --navy-700:#16294D;
    --gold-500:#C9A646; --gold-300:#E8D5A0;
    --cream-50:#F7F4EC; --line:#E3DECF;
    --ink:#14161C; --muted:#6B7280;
    --ok:#2E7D4F; --err:#C0392B;
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:'Inter',sans-serif; background:var(--cream-50); color:var(--ink);}
  .mono{font-family:'IBM Plex Mono',monospace;}
  button{font-family:inherit; cursor:pointer;}
  input,textarea,select{font-family:inherit;}

  /* LOGIN */
  #loginScreen{ min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--navy-900); padding:20px;}
  .login-card{ background:var(--navy-800); border:1px solid rgba(201,166,70,0.2); border-radius:16px; padding:40px; width:100%; max-width:380px; }
  .login-card h1{ color:#fff; font-size:20px; margin:0 0 4px; }
  .login-card p{ color:var(--gold-300); font-size:13px; margin:0 0 26px; font-family:'IBM Plex Mono',monospace;}
  .login-card label{ display:block; color:#fff; font-size:13px; margin-bottom:6px; font-weight:600;}
  .login-card input{ width:100%; padding:12px 14px; border-radius:8px; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.05); color:#fff; margin-bottom:16px; font-size:14px;}
  .login-card input:focus{ outline:none; border-color:var(--gold-500); }
  .login-card button{ width:100%; padding:13px; border-radius:8px; border:none; background:var(--gold-500); color:var(--navy-900); font-weight:700; font-size:14.5px;}
  #loginError{ color:#E08585; font-size:13px; margin-top:12px; min-height:18px;}

  /* APP SHELL */
  #app{ display:none; min-height:100vh; }
  .topbar{ background:var(--navy-900); color:#fff; display:flex; align-items:center; justify-content:space-between; padding:16px 28px; }
  .topbar h1{ font-size:16px; margin:0; font-weight:600;}
  .topbar h1 span{color:var(--gold-300);}
  .logout{ background:transparent; border:1px solid rgba(255,255,255,0.2); color:#fff; padding:8px 16px; border-radius:8px; font-size:13px;}
  .logout:hover{ border-color:var(--gold-500); }

  .tabs{ display:flex; gap:4px; background:#fff; border-bottom:1px solid var(--line); padding:0 28px; overflow-x:auto;}
  .tab{ padding:14px 18px; border:none; background:none; font-size:14px; font-weight:600; color:var(--muted); border-bottom:2px solid transparent; white-space:nowrap;}
  .tab.active{ color:var(--navy-900); border-bottom-color:var(--gold-500); }

  .panel{ display:none; padding:28px; max-width:980px; margin:0 auto; }
  .panel.active{ display:block; }
  .panel-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; flex-wrap:wrap; gap:10px;}
  .panel-head h2{ font-size:19px; margin:0;}
  .btn{ padding:10px 18px; border-radius:8px; border:none; font-weight:600; font-size:13.5px; }
  .btn-primary{ background:var(--navy-900); color:#fff;}
  .btn-primary:hover{ background:var(--navy-700); }
  .btn-gold{ background:var(--gold-500); color:var(--navy-900);}
  .btn-sm{ padding:6px 12px; font-size:12.5px; border-radius:6px; }
  .btn-outline{ background:#fff; border:1px solid var(--line); color:var(--ink);}
  .btn-danger{ background:#fff; border:1px solid #F1C2C2; color:var(--err); }

  .card{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:20px; margin-bottom:14px;}
  .card-row{ display:flex; justify-content:space-between; gap:16px; align-items:flex-start; flex-wrap:wrap;}
  .badge{ display:inline-block; font-size:11px; font-weight:700; padding:3px 9px; border-radius:99px; text-transform:uppercase; letter-spacing:0.04em;}
  .badge.new{ background:#FDEDEC; color:var(--err);}
  .badge.read{ background:#EAF3EE; color:var(--ok);}
  .badge.pending{ background:#FDF3DC; color:#9A7B12;}
  .badge.confirmed{ background:#EAF3EE; color:var(--ok);}

  .meta{ font-size:12.5px; color:var(--muted); margin-top:6px;}
  .msg{ font-size:14px; margin-top:10px; line-height:1.6; }
  .actions{ display:flex; gap:8px; flex-wrap:wrap;}

  /* services editor */
  .svc-edit{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:10px;}
  .svc-edit textarea{ grid-column:1/-1; }
  .svc-edit input, .svc-edit textarea{ width:100%; padding:10px 12px; border-radius:7px; border:1px solid var(--line); font-size:13.5px;}
  .svc-edit textarea{ min-height:60px; resize:vertical;}
  .field-label{ font-size:11.5px; font-weight:700; color:var(--muted); text-transform:uppercase; margin-bottom:4px; display:block;}

  .empty{ text-align:center; padding:50px 20px; color:var(--muted); font-size:14px;}
  .save-bar{ position:sticky; bottom:0; background:#fff; border-top:1px solid var(--line); padding:14px 0; display:flex; justify-content:flex-end; gap:10px;}
  #toast{ position:fixed; bottom:20px; right:20px; background:var(--navy-900); color:#fff; padding:12px 20px; border-radius:8px; font-size:13.5px; opacity:0; transform:translateY(10px); transition:.25s; pointer-events:none; z-index:999;}
  #toast.show{ opacity:1; transform:translateY(0); }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <h1>Grace Of God Xchange</h1>
    <p class="mono">ADMIN PANEL</p>
    <form id="loginForm">
      <label for="u">Username</label>
      <input type="text" id="u" autocomplete="username" required>
      <label for="p">Password</label>
      <input type="password" id="p" autocomplete="current-password" required>
      <button type="submit">Log In</button>
      <div id="loginError"></div>
    </form>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <h1>Grace Of God <span>Xchange</span> — Admin</h1>
    <button class="logout" id="logoutBtn">Log Out</button>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="services">Services</button>
    <button class="tab" data-tab="messages">Messages</button>
    <button class="tab" data-tab="bookings">Bookings</button>
    <button class="tab" data-tab="settings">Settings</button>
  </div>

  <!-- SERVICES -->
  <div class="panel active" id="panel-services">
    <div class="panel-head">
      <h2>Manage Services</h2>
      <button class="btn btn-gold" id="addServiceBtn">+ Add Service</button>
    </div>
    <div id="servicesList"></div>
    <div class="save-bar">
      <button class="btn btn-primary" id="saveServicesBtn">Save Changes</button>
    </div>
  </div>

  <!-- MESSAGES -->
  <div class="panel" id="panel-messages">
    <div class="panel-head"><h2>Contact Messages</h2></div>
    <div id="messagesList"></div>
  </div>

  <!-- BOOKINGS -->
  <div class="panel" id="panel-bookings">
    <div class="panel-head"><h2>Bookings</h2></div>
    <div id="bookingsList"></div>
  </div>

  <!-- SETTINGS -->
  <div class="panel" id="panel-settings">
    <div class="panel-head"><h2>Settings</h2></div>
    <div class="card" style="max-width:420px;">
      <span class="field-label">Change Admin Password</span>
      <form id="pwForm">
        <input type="password" id="curPw" placeholder="Current password" required style="width:100%; padding:10px 12px; margin-bottom:10px; border:1px solid var(--line); border-radius:7px;">
        <input type="password" id="newPw" placeholder="New password (min 8 chars)" required minlength="8" style="width:100%; padding:10px 12px; margin-bottom:12px; border:1px solid var(--line); border-radius:7px;">
        <button class="btn btn-primary" type="submit">Update Password</button>
        <div id="pwStatus" class="meta" style="margin-top:10px;"></div>
      </form>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API_BASE = ""; // same-origin
let token = localStorage.getItem('gogx_admin_token') || null;

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

async function api(path, opts = {}){
  const res = await fetch(`${API_BASE}${path}`, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { Authorization: `Bearer ${token}` } : {}),
      ...(opts.headers || {})
    }
  });
  if (res.status === 401) { logout(); throw new Error('Session expired'); }
  if (!res.ok) { const e = await res.json().catch(()=>({error:'Request failed'})); throw new Error(e.error || 'Request failed'); }
  return res.status === 204 ? null : res.json();
}

function logout(){
  token = null;
  localStorage.removeItem('gogx_admin_token');
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const u = document.getElementById('u').value;
  const p = document.getElementById('p').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  try {
    const res = await fetch(`${API_BASE}/api/admin/login`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username: u, password: p })
    });
    if (!res.ok) throw new Error('Invalid username or password');
    const data = await res.json();
    token = data.token;
    localStorage.setItem('gogx_admin_token', token);
    enterApp();
  } catch (err) {
    errEl.textContent = err.message;
  }
});
document.getElementById('logoutBtn').addEventListener('click', logout);

/* tabs */
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(`panel-${tab.dataset.tab}`).classList.add('active');
  });
});

function enterApp(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadServices();
  loadMessages();
  loadBookings();
}

/* ---------- SERVICES ---------- */
let servicesCache = [];
async function loadServices(){
  servicesCache = await api('/api/services');
  renderServices();
}
function renderServices(){
  const list = document.getElementById('servicesList');
  if (!servicesCache.length){ list.innerHTML = '<div class="empty">No services yet. Add one above.</div>'; return; }
  list.innerHTML = servicesCache.map((s, i) => `
    <div class="card">
      <div class="svc-edit">
        <div>
          <span class="field-label">Title</span>
          <input value="${escapeHtml(s.title)}" data-i="${i}" data-f="title">
        </div>
        <div>
          <span class="field-label">Rate / note (optional)</span>
          <input value="${escapeHtml(s.rate || '')}" data-i="${i}" data-f="rate" placeholder="e.g. 92% rate">
        </div>
        <div>
          <span class="field-label">Description</span>
          <textarea data-i="${i}" data-f="desc">${escapeHtml(s.desc)}</textarea>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-sm btn-danger" data-remove="${i}">Remove</button>
      </div>
    </div>`).join('');

  list.querySelectorAll('input,textarea').forEach(el => {
    el.addEventListener('input', () => {
      servicesCache[el.dataset.i][el.dataset.f] = el.value;
    });
  });
  list.querySelectorAll('[data-remove]').forEach(btn => {
    btn.addEventListener('click', () => {
      servicesCache.splice(Number(btn.dataset.remove), 1);
      renderServices();
    });
  });
}
document.getElementById('addServiceBtn').addEventListener('click', () => {
  servicesCache.push({ id: 's' + Date.now(), title: 'New Service', desc: 'Description here.', icon: 'asset', rate: '' });
  renderServices();
});
document.getElementById('saveServicesBtn').addEventListener('click', async () => {
  try {
    await api('/api/admin/services', { method: 'PUT', body: JSON.stringify(servicesCache) });
    showToast('Services saved');
  } catch (err) { showToast(err.message); }
});

/* ---------- MESSAGES ---------- */
async function loadMessages(){
  const data = await api('/api/admin/contacts');
  const list = document.getElementById('messagesList');
  if (!data.length){ list.innerHTML = '<div class="empty">No messages yet.</div>'; return; }
  list.innerHTML = data.map(m => `
    <div class="card">
      <div class="card-row">
        <div>
          <strong>${escapeHtml(m.name)}</strong>
          <span class="badge ${m.status === 'new' ? 'new' : 'read'}">${m.status}</span>
          <div class="meta">${escapeHtml(m.email)} · ${escapeHtml(m.phone)} · ${new Date(m.createdAt).toLocaleString()}</div>
        </div>
        <div class="actions">
          ${m.status === 'new' ? `<button class="btn btn-sm btn-outline" data-read="${m.id}">Mark Read</button>` : ''}
          <button class="btn btn-sm btn-danger" data-del-msg="${m.id}">Delete</button>
        </div>
      </div>
      <div class="msg">${escapeHtml(m.message)}</div>
    </div>`).join('');

  list.querySelectorAll('[data-read]').forEach(btn => btn.addEventListener('click', async () => {
    await api(`/api/admin/contacts/${btn.dataset.read}`, { method:'PATCH', body: JSON.stringify({status:'read'}) });
    loadMessages();
  }));
  list.querySelectorAll('[data-del-msg]').forEach(btn => btn.addEventListener('click', async () => {
    if (!confirm('Delete this message?')) return;
    await api(`/api/admin/contacts/${btn.dataset.delMsg}`, { method:'DELETE' });
    loadMessages();
  }));
}

/* ---------- BOOKINGS ---------- */
async function loadBookings(){
  const data = await api('/api/admin/bookings');
  const list = document.getElementById('bookingsList');
  if (!data.length){ list.innerHTML = '<div class="empty">No bookings yet.</div>'; return; }
  list.innerHTML = data.map(b => `
    <div class="card">
      <div class="card-row">
        <div>
          <strong>${escapeHtml(b.name)}</strong>
          <span class="badge ${b.status === 'confirmed' ? 'confirmed' : 'pending'}">${b.status}</span>
          <div class="meta">${escapeHtml(b.service)} · ${escapeHtml(b.email)} · ${escapeHtml(b.phone)}${b.date ? ' · ' + escapeHtml(b.date) : ''}</div>
          ${b.notes ? `<div class="msg">${escapeHtml(b.notes)}</div>` : ''}
        </div>
        <div class="actions">
          ${b.status !== 'confirmed' ? `<button class="btn btn-sm btn-outline" data-confirm="${b.id}">Confirm</button>` : ''}
          <button class="btn btn-sm btn-danger" data-del-book="${b.id}">Delete</button>
        </div>
      </div>
    </div>`).join('');

  list.querySelectorAll('[data-confirm]').forEach(btn => btn.addEventListener('click', async () => {
    await api(`/api/admin/bookings/${btn.dataset.confirm}`, { method:'PATCH', body: JSON.stringify({status:'confirmed'}) });
    loadBookings();
  }));
  list.querySelectorAll('[data-del-book]').forEach(btn => btn.addEventListener('click', async () => {
    if (!confirm('Delete this booking?')) return;
    await api(`/api/admin/bookings/${btn.dataset.delBook}`, { method:'DELETE' });
    loadBookings();
  }));
}

/* ---------- SETTINGS ---------- */
document.getElementById('pwForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const statusEl = document.getElementById('pwStatus');
  statusEl.textContent = '';
  try {
    await api('/api/admin/change-password', {
      method: 'POST',
      body: JSON.stringify({
        currentPassword: document.getElementById('curPw').value,
        newPassword: document.getElementById('newPw').value
      })
    });
    statusEl.style.color = 'var(--ok)';
    statusEl.textContent = 'Password updated.';
    e.target.reset();
  } catch (err) {
    statusEl.style.color = 'var(--err)';
    statusEl.textContent = err.message;
  }
});

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* auto-login if token present */
if (token) enterApp();
</script>
</body>
</html>
